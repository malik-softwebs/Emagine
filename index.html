<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efind | High-Fidelity Media</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Google Sans"', 'sans-serif'] },
                    colors: {
                        brand: {
                            primary: '#0061A4',
                            surface: '#FDFBFF',
                            'surface-dark': '#1A1C1E',
                            'on-surface-variant': '#44474F',
                            'outline': '#74777F'
                        }
                    },
                    borderRadius: { '3xl': '28px' }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .masonry { columns: 2; column-gap: 1.25rem; }
        @media (min-width: 768px) { .masonry { columns: 3; } }
        @media (min-width: 1024px) { .masonry { columns: 4; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1.25rem; }

        /* Skeleton Animation */
        .skeleton {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            background-color: #E0E2EC;
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .dark .skeleton { background-color: #33353A; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Custom Dropdown Animation */
        .dropdown-content {
            transform: scale(0.95);
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0, 0, 0.2, 1);
        }
        .dropdown-active .dropdown-content {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body class="bg-brand-surface dark:bg-brand-surface-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="sticky top-0 z-40 bg-brand-surface/70 dark:bg-brand-surface-dark/70 backdrop-blur-xl border-b border-transparent">
        <div class="max-w-7xl mx-auto px-6 py-6 space-y-6">
            <div class="flex items-center justify-between">
                <span class="text-3xl font-bold tracking-tighter text-brand-primary select-none">Efind</span>
                <button id="themeToggle" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                    <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
                </button>
            </div>

            <div class="relative group max-w-3xl mx-auto w-full">
                <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 group-focus-within:text-brand-primary transition-colors">search</span>
                <input type="text" id="searchInput" placeholder="Search high-res assets..." 
                       class="w-full pl-14 pr-6 py-5 bg-slate-100 dark:bg-slate-800/50 border-2 border-transparent focus:border-brand-primary focus:bg-white dark:focus:bg-brand-surface-dark rounded-3xl outline-none transition-all text-lg shadow-sm">
            </div>

            <div class="flex items-center gap-3 overflow-x-auto no-scrollbar pb-2">
                <div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-2xl">
                    <button class="type-btn active px-6 py-2 rounded-xl text-sm font-medium transition-all bg-white dark:bg-slate-700 shadow-sm" data-type="photos">Photos</button>
                    <button class="type-btn px-6 py-2 rounded-xl text-sm font-medium transition-all" data-type="videos">Videos</button>
                </div>
                
                <div class="relative custom-dropdown" id="sizeDropdown">
                    <button class="px-6 py-3 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-medium flex items-center gap-2 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                        <span id="sizeLabel">All Sizes</span>
                        <span class="material-symbols-outlined text-sm">expand_more</span>
                    </button>
                    <div class="dropdown-content absolute top-full left-0 mt-2 w-48 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl p-2 z-50">
                        <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="">All Sizes</div>
                        <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="large">Large (4K+)</div>
                        <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="medium">Medium</div>
                        <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="small">Small</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-8">
        <div id="galleryGrid" class="masonry">
            <div class="masonry-item h-64 skeleton rounded-3xl"></div>
            <div class="masonry-item h-80 skeleton rounded-3xl"></div>
            <div class="masonry-item h-72 skeleton rounded-3xl"></div>
            <div class="masonry-item h-96 skeleton rounded-3xl"></div>
        </div>
    </main>

    <footer class="py-12 border-t border-slate-100 dark:border-slate-800 text-center space-y-4">
        <p class="text-slate-400 text-sm font-medium tracking-widest uppercase">Powered by</p>
        <a href="https://hybox.netlify.app" class="text-2xl font-bold hover:text-brand-primary transition-colors">HyBox</a>
    </footer>

    <div id="lightbox" class="fixed inset-0 z-50 bg-white/95 dark:bg-brand-surface-dark/95 backdrop-blur-2xl hidden flex-col items-center p-6 overflow-y-auto">
        <div class="w-full max-w-6xl flex justify-between items-center mb-8">
            <span class="text-sm font-bold tracking-widest uppercase text-slate-400">Preview Asset</span>
            <button id="closeLightbox" class="w-12 h-12 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-full hover:rotate-90 transition-all duration-300">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <div id="mediaContainer" class="w-full max-w-5xl aspect-video rounded-3xl overflow-hidden shadow-2xl bg-black flex items-center justify-center"></div>

        <div class="w-full max-w-5xl mt-10 grid grid-cols-1 md:grid-cols-2 gap-10 pb-20">
            <div class="space-y-2">
                <h2 id="mediaTitle" class="text-3xl font-bold tracking-tight"></h2>
                <p id="authorInfo" class="text-slate-500 font-medium"></p>
            </div>

            <div class="bg-slate-50 dark:bg-slate-800/50 p-8 rounded-[32px] space-y-6">
                <h3 class="text-sm font-bold uppercase tracking-widest text-brand-primary">Export Configuration</h3>
                
                <div class="flex flex-wrap gap-4">
                    <div class="flex-1 min-w-[140px] space-y-3">
                        <label class="text-xs font-bold text-slate-400">Quality / Width</label>
                        <div class="relative custom-dropdown" id="resDropdown">
                            <button class="w-full px-5 py-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl text-sm flex justify-between items-center">
                                <span id="resLabel">Original</span>
                                <span class="material-symbols-outlined text-sm">expand_more</span>
                            </button>
                            <div class="dropdown-content absolute bottom-full left-0 mb-2 w-full bg-white dark:bg-slate-800 border rounded-2xl shadow-xl p-2">
                                <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="original">Original</div>
                                <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="1920">1080p (Full HD)</div>
                                <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="1280">720p (HD)</div>
                                <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="640">480p (SD)</div>
                            </div>
                        </div>
                    </div>

                    <div class="flex-1 min-w-[140px] space-y-3">
                        <label class="text-xs font-bold text-slate-400">Format</label>
                        <div class="relative custom-dropdown" id="formatDropdown">
                            <button class="w-full px-5 py-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl text-sm flex justify-between items-center">
                                <span id="formatLabel">JPG (Default)</span>
                                <span class="material-symbols-outlined text-sm">expand_more</span>
                            </button>
                            <div class="dropdown-content absolute bottom-full left-0 mb-2 w-full bg-white dark:bg-slate-800 border rounded-2xl shadow-xl p-2">
                                <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="jpg">JPG</div>
                                <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="png">PNG</div>
                                <div class="dropdown-item p-3 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl cursor-pointer text-sm" data-val="webp">WEBP</div>
                            </div>
                        </div>
                    </div>
                </div>

                <button id="mainDownloadBtn" class="w-full py-5 bg-brand-primary text-white rounded-3xl font-bold text-lg hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-brand-primary/20 flex items-center justify-center gap-3">
                    <span class="material-symbols-outlined">download</span> Download Now
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'mOAPIhk8WgMTaWUWWfZMBSEzdDGTbUDwgx7w65g8IZyK4saejaRh8Rik';
        let state = {
            query: 'Nature',
            type: 'photos',
            page: 1,
            size: '',
            isLoading: false,
            activeItem: null
        };

        // --- Custom Dropdown Logic ---
        document.querySelectorAll('.custom-dropdown').forEach(dropdown => {
            const btn = dropdown.querySelector('button');
            const items = dropdown.querySelectorAll('.dropdown-item');
            const label = dropdown.querySelector('span:first-child');

            btn.onclick = (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('dropdown-active');
            };

            items.forEach(item => {
                item.onclick = () => {
                    label.innerText = item.innerText;
                    dropdown.classList.remove('dropdown-active');
                    if (dropdown.id === 'sizeDropdown') {
                        state.size = item.dataset.val;
                        initFetch();
                    }
                };
            });
        });

        window.onclick = () => document.querySelectorAll('.custom-dropdown').forEach(d => d.classList.remove('dropdown-active'));

        // --- Fetch & Render ---
        async function initFetch(loadMore = false) {
            if (state.isLoading) return;
            state.isLoading = true;
            
            if (!loadMore) {
                state.page = 1;
                document.getElementById('galleryGrid').innerHTML = Array(8).fill(0).map(() => `<div class="masonry-item h-64 skeleton rounded-3xl"></div>`).join('');
            }

            const url = `https://api.pexels.com/${state.type === 'photos' ? 'v1' : 'videos'}/search?query=${state.query}&page=${state.page}&per_page=20&size=${state.size}`;
            
            try {
                const res = await fetch(url, { headers: { Authorization: API_KEY } });
                const data = await res.json();
                const items = state.type === 'photos' ? data.photos : data.videos;
                
                if (!loadMore) document.getElementById('galleryGrid').innerHTML = '';
                renderGrid(items);
                state.page++;
            } catch (e) { console.error(e); }
            state.isLoading = false;
        }

        function renderGrid(items) {
            const grid = document.getElementById('galleryGrid');
            items.forEach(item => {
                const isVideo = !!item.video_files;
                const div = document.createElement('div');
                div.className = 'masonry-item group relative overflow-hidden rounded-3xl cursor-pointer bg-slate-100 dark:bg-slate-800 transform transition-all duration-500 hover:-translate-y-2';
                
                div.innerHTML = `
                    <img src="${isVideo ? item.image : item.src.large}" class="w-full h-auto object-cover opacity-0 transition-opacity duration-700" onload="this.classList.remove('opacity-0')">
                    <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                         <div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white">
                            <span class="material-symbols-outlined text-3xl">${isVideo ? 'play_arrow' : 'visibility'}</span>
                         </div>
                    </div>
                `;
                div.onclick = () => openLightbox(item, isVideo);
                grid.appendChild(div);
            });
        }

        // --- Lightbox & Advanced Download ---
        function openLightbox(item, isVideo) {
            state.activeItem = item;
            const container = document.getElementById('mediaContainer');
            const title = document.getElementById('mediaTitle');
            const author = document.getElementById('authorInfo');
            
            container.innerHTML = isVideo 
                ? `<video controls class="max-h-full"><source src="${item.video_files[0].link}"></video>`
                : `<img src="${item.src.large2x}" class="max-h-full object-contain">`;

            title.innerText = isVideo ? "Cinematic Video" : (item.alt || "Curated Photography");
            author.innerText = `by ${isVideo ? item.user.name : item.photographer}`;
            
            document.getElementById('lightbox').classList.remove('hidden');
            document.getElementById('lightbox').classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('mainDownloadBtn').onclick = async () => {
            const btn = document.getElementById('mainDownloadBtn');
            const quality = document.getElementById('resLabel').innerText;
            const format = document.getElementById('formatLabel').innerText.split(' ')[0].toLowerCase();
            const isVideo = !!state.activeItem.video_files;
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                let downloadUrl = isVideo ? state.activeItem.video_files[0].link : state.activeItem.src.original;
                
                // Logic for custom width if not 'original'
                const resVal = document.querySelector('#resDropdown .dropdown-item[data-val]:not([data-val="original"])')?.dataset.val;
                if (!isVideo && quality !== 'Original') {
                    downloadUrl = `${state.activeItem.src.original}?auto=compress&cs=tinysrgb&w=${quality.split(' ')[0]}`;
                }

                // Generate Custom Filename: efind-{img/video}-{hhmmss}-hybox.{ext}
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2,'0') + 
                               now.getMinutes().toString().padStart(2,'0') + 
                               now.getSeconds().toString().padStart(2,'0');
                const fileName = `efind-${isVideo ? 'video' : 'img'}-${timeStr}-hybox.${format}`;

                // Handle format conversion via Canvas (for images)
                if (!isVideo && (format === 'png' || format === 'webp')) {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.src = downloadUrl;
                    await new Promise(r => img.onload = r);
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    const blob = await new Promise(r => canvas.toBlob(r, `image/${format}`, 1.0));
                    saveAs(blob, fileName);
                } else {
                    // Direct Download
                    const res = await fetch(downloadUrl);
                    const blob = await res.blob();
                    saveAs(blob, fileName);
                }
            } catch (e) {
                alert("Download failed. This is usually due to CORS restrictions on high-res assets in standard browsers.");
            } finally {
                btn.innerHTML = `<span class="material-symbols-outlined">download</span> Download Now`;
                btn.disabled = false;
            }
        };

        function saveAs(blob, name) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
        }

        // --- Interaction Listeners ---
        document.getElementById('closeLightbox').onclick = () => {
            document.getElementById('lightbox').classList.add('hidden');
            document.body.style.overflow = 'auto';
        };

        let searchTimeout;
        document.getElementById('searchInput').oninput = (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                state.query = e.target.value || 'Nature';
                initFetch();
            }, 500);
        };

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active', 'bg-white', 'dark:bg-slate-700', 'shadow-sm'));
                btn.classList.add('active', 'bg-white', 'dark:bg-slate-700', 'shadow-sm');
                state.type = btn.dataset.type;
                initFetch();
            };
        });

        document.getElementById('themeToggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').innerText = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
        };

        // Scroll listener
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) initFetch(true);
        };

        initFetch();
    </script>
</body>
</html>
