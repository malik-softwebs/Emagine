<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyBox | Premium Media Gallery</title>
    
    <meta name="description" content="High-performance, MD3-inspired image and video gallery powered by HyBox.">
    <meta property="og:title" content="HyBox Media Gallery">
    <meta property="og:description" content="Search and filter thousands of high-quality assets.">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Google Sans"', 'sans-serif'] },
                    colors: {
                        md3: {
                            'primary': '#0061a4',
                            'surface': '#fdfbff',
                            'surface-dark': '#1a1c1e',
                            'surface-variant': '#e0e2ec',
                            'surface-variant-dark': '#44474f',
                            'secondary-container': '#d1e4ff',
                            'secondary-container-dark': '#004977',
                        }
                    },
                    borderRadius: { '3xl': '28px' }
                }
            }
        }
    </script>

    <style>
        .masonry-grid { columns: 2; column-gap: 1rem; }
        @media (min-width: 768px) { .masonry-grid { columns: 3; } }
        @media (min-width: 1024px) { .masonry-grid { columns: 4; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1rem; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #44474f; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c4c7cf; border-radius: 10px; }
        
        .loading-skeleton {
            background: linear-gradient(90deg, #e0e2ec 25%, #fdfbff 50%, #e0e2ec 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>

<body class="bg-md3-surface dark:bg-md3-surface-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <header class="sticky top-0 z-40 bg-md3-surface/80 dark:bg-md3-surface-dark/80 backdrop-blur-md px-4 py-4">
        <div class="max-w-7xl mx-auto flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold tracking-tight text-md3-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-3xl">box</span> HyBox Gallery
                </h1>
                <button id="themeToggle" class="p-3 rounded-full hover:bg-md3-surface-variant dark:hover:bg-md3-surface-variant-dark transition-all">
                    <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
                </button>
            </div>

            <div class="relative w-full max-w-2xl mx-auto">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-500">search</span>
                <input type="text" id="searchInput" placeholder="Search photos and videos..." 
                       class="w-full pl-12 pr-4 py-4 bg-md3-surface-variant dark:bg-md3-surface-variant-dark rounded-full focus:ring-2 ring-md3-primary outline-none transition-all">
            </div>

            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar scroll-smooth">
                <button class="filter-chip active px-5 py-2 rounded-full bg-md3-secondary-container dark:bg-md3-secondary-container-dark text-sm font-medium whitespace-nowrap" data-type="photos">Photos</button>
                <button class="filter-chip px-5 py-2 rounded-full bg-md3-surface-variant dark:bg-md3-surface-variant-dark text-sm font-medium whitespace-nowrap" data-type="videos">Videos</button>
                <div class="w-px h-6 bg-slate-300 dark:bg-slate-700 my-auto mx-2"></div>
                <select id="orientationFilter" class="bg-transparent text-sm font-medium outline-none">
                    <option value="">All Orientations</option>
                    <option value="landscape">Landscape</option>
                    <option value="portrait">Portrait</option>
                    <option value="square">Square</option>
                </select>
                <select id="sizeFilter" class="bg-transparent text-sm font-medium outline-none">
                    <option value="">All Sizes</option>
                    <option value="large">Large</option>
                    <option value="medium">Medium</option>
                    <option value="small">Small</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        <div id="galleryGrid" class="masonry-grid">
            </div>
        
        <div id="loader" class="hidden flex justify-center py-10">
            <div class="animate-spin rounded-full h-8 w-8 border-4 border-md3-primary border-t-transparent"></div>
        </div>
    </main>

    <div id="lightbox" class="fixed inset-0 z-50 bg-black/95 backdrop-blur-xl hidden flex-col items-center justify-center p-4">
        <button id="closeLightbox" class="absolute top-6 right-6 text-white p-2 bg-white/10 rounded-full hover:bg-white/20">
            <span class="material-symbols-outlined">close</span>
        </button>
        <div id="lightboxContent" class="w-full max-w-5xl h-[80vh] flex items-center justify-center"></div>
        <div id="lightboxMeta" class="mt-6 text-center text-white">
            <p id="photographerName" class="text-xl font-medium"></p>
            <div class="flex gap-4 mt-4">
                <a id="downloadBtn" target="_blank" class="px-8 py-3 bg-md3-primary rounded-full text-white font-medium hover:opacity-90 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">download</span> Download Original
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'mOAPIhk8WgMTaWUWWfZMBSEzdDGTbUDwgx7w65g8IZyK4saejaRh8Rik';
        let currentPage = 1;
        let currentQuery = 'Architecture';
        let mediaType = 'photos'; // 'photos' or 'videos'
        let isLoading = false;

        const grid = document.getElementById('galleryGrid');
        const searchInput = document.getElementById('searchInput');
        const lightbox = document.getElementById('lightbox');

        // --- Core Fetch Logic ---
        async function fetchMedia(loadMore = false) {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loader').classList.remove('hidden');

            if (!loadMore) {
                grid.innerHTML = '';
                currentPage = 1;
            }

            const orientation = document.getElementById('orientationFilter').value;
            const size = document.getElementById('sizeFilter').value;
            
            const url = `https://api.pexels.com/${mediaType === 'photos' ? 'v1' : 'videos'}/search?query=${currentQuery}&page=${currentPage}&per_page=30&orientation=${orientation}&size=${size}`;

            try {
                const response = await fetch(url, { headers: { Authorization: API_KEY } });
                const data = await response.json();
                renderMedia(mediaType === 'photos' ? data.photos : data.videos);
                currentPage++;
            } catch (error) {
                console.error("Fetch error:", error);
            } finally {
                isLoading = false;
                document.getElementById('loader').classList.add('hidden');
            }
        }

        // --- UI Rendering ---
        function renderMedia(items) {
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'masonry-item group relative overflow-hidden rounded-3xl cursor-pointer bg-md3-surface-variant dark:bg-md3-surface-variant-dark';
                
                const isVideo = !!item.video_files;
                const thumb = isVideo ? item.image : item.src.large;
                const author = isVideo ? item.user.name : item.photographer;

                div.innerHTML = `
                    <img src="${thumb}" alt="${author}" class="w-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent opacity-0 group-hover:opacity-100 transition-opacity p-4 flex flex-col justify-end">
                        <p class="text-white text-sm font-medium flex items-center gap-2">
                            <span class="material-symbols-outlined text-xs">${isVideo ? 'videocam' : 'image'}</span> ${author}
                        </p>
                    </div>
                `;

                div.onclick = () => openLightbox(item, isVideo);
                grid.appendChild(div);
            });
        }

        // --- Lightbox Logic ---
        function openLightbox(item, isVideo) {
            const content = document.getElementById('lightboxContent');
            const name = document.getElementById('photographerName');
            const dl = document.getElementById('downloadBtn');

            content.innerHTML = isVideo 
                ? `<video controls autoplay class="max-h-full rounded-2xl"><source src="${item.video_files[0].link}" type="video/mp4"></video>`
                : `<img src="${item.src.original}" class="max-h-full object-contain rounded-lg">`;

            name.innerText = `Captured by ${isVideo ? item.user.name : item.photographer}`;
            dl.href = isVideo ? item.video_files[0].link : item.src.original;
            
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        // --- Event Listeners ---
        document.getElementById('closeLightbox').onclick = () => {
            lightbox.classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.getElementById('lightboxContent').innerHTML = '';
        };

        // Debounced Search
        let timeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                currentQuery = e.target.value || 'Architecture';
                fetchMedia();
            }, 600);
        });

        // Theme Toggle
        document.getElementById('themeToggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('themeIcon').innerText = isDark ? 'light_mode' : 'dark_mode';
        };

        // Filter Chips
        document.querySelectorAll('.filter-chip').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active', 'bg-md3-secondary-container', 'dark:bg-md3-secondary-container-dark'));
                btn.classList.add('active', 'bg-md3-secondary-container', 'dark:bg-md3-secondary-container-dark');
                mediaType = btn.dataset.type;
                fetchMedia();
            };
        });

        // Advanced Filters
        document.getElementById('orientationFilter').onchange = () => fetchMedia();
        document.getElementById('sizeFilter').onchange = () => fetchMedia();

        // Infinite Scroll
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) {
                fetchMedia(true);
            }
        };

        // Initial Load
        fetchMedia();
    </script>
</body>
</html>
